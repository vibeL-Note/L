<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>活动日程</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
    body{background:#f7f8fa;padding:16px 16px 80px}
    .header{display:flex;align-items:center;gap:12px;padding:10px 0}
    .filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
    .filter-btn{padding:6px 12px;border-radius:8px;background:#fff;border:1px solid #e5e5e7;font-size:14px;cursor:pointer}
    .filter-btn.active{background:#007aff;color:#fff}
    .sort-btn{margin-left:auto}
    .card-list{display:grid;grid-template-columns:1fr;gap:16px}
    .card{background:#fff;border-radius:12px;padding:20px;position:relative;box-shadow:0 1px 3px #0001;transition:all 0.3s ease}
    .card.highlight{border:2px solid #007aff;background:#f0f8ff;box-shadow:0 0 10px rgba(0, 122, 255, 0.2);}
    .card.faded{opacity:0.5}
    .card.expired{opacity:0.45;filter:grayscale(80%)}
    .card-expire{position:absolute;right:16px;top:16px;font-size:12px;padding:3px 6px;border-radius:4px;background:#ffebee;color:#d32f2f}

    .card-actions-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 16px;
      width: 100%;
    }
    .card-remind {
      font-size:13px;color:#007aff;cursor:pointer;margin:0;flex-shrink:0;
    }
    .card-opt-group {
      display:flex;align-items:center;gap:12px;flex-shrink:0;
    }
    .card-edit {
      font-size:14px;padding:3px 6px;cursor:pointer;color:#1890ff;background:transparent;border:none;
    }
    .card-del {
      font-size:14px;padding:3px 6px;cursor:pointer;color:#666;background:transparent;border:none;
    }
    .card-del:hover {color:#ff4444;}

    .card-game-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;margin-bottom:8px}
    .card-game-tag.mingchao{background:#e6f7ff;color:#1890ff}
    .card-game-tag.warmth{background:#fff0f6;color:#eb2f96}
    .card-game-tag.genshin{background:#f6ffed;color:#52c41a}
    .card-game-tag.juequ{background:#f9f0ff;color:#722ed1}
    .card-game-tag.starrail{background:#fff7e6;color:#fa8c16}
    .card-game-tag.reverse{background:#f1ba20;color:#ab751d}
    .card-game-tag.Arknigs{background:#faf7ef;color:#9e2120}
    /* 修复：转义冒号 + 正确定义样式 */
    .card-game-tag.Arknigs\:Endfield{background:#a1624b;color:#fff9f1 !important;}
    .card-title{font-size:18px;font-weight:500;margin-bottom:16px}
    .card-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:15px;line-height:1.2;}
    .calendar-icon {display:inline-block;width:20px;height:20px;font-size:16px;color:#007aff;text-align:center;line-height:20px;flex-shrink:0;}
    .card-label{color:#86868b;min-width:50px;flex-shrink:0;}
    .date-value{font-size:15px;color:#1d1d1f;flex:1;}
    .add-record-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;border-radius:12px;padding:16px;margin-top:24px}
    .add-icon{width:24px;height:24px;border:1px solid #999;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#999}
    .toolbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e5e7;display:flex;justify-content:space-around;padding:12px 0}
    .toolbar-item{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:12px;color:#666;cursor:pointer}
    .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:#0008;display:none;align-items:center;justify-content:center}
    .modal-content{background:#fff;border-radius:12px;padding:24px;width:90%;max-width:400px}
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:14px;color:#666;margin-bottom:4px}
    .form-input,.form-select{width:100%;padding:10px 12px;border:1px solid #e5e5e5;border-radius:8px;font-size:15px;line-height:1.4;appearance:none;-webkit-appearance:none;background-color:#fff;box-sizing:border-box;}
    input[type="date"]{font-family:inherit;color:#333;height:42px;box-sizing:border-box;}
    input[type="date"]::-webkit-calendar-picker-indicator {width:20px;height:20px;margin-right:8px;cursor:pointer;filter:invert(0.5);}
    input[type="date"]::-ms-clear {display:none;}
    .form-input:focus,.form-select:focus{outline:none;border-color:#007aff;box-shadow:0 0 0 2px rgba(0,122,255,0.2);}
    .modal-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:20px}
    .modal-btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer}
    .cancel{background:#f5f5f5;color:#666}
    .confirm{background:#007aff;color:#fff}
    @media screen and (min-width:768px) {.card-list{grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:20px}body{padding:24px 24px 80px}.card{padding:24px}}
    .reset-search-btn{position:fixed;top:16px;right:16px;padding:6px 12px;border-radius:8px;background:#007aff;color:#fff;border:none;font-size:14px;cursor:pointer;display:none;z-index:99;}

    /* 密码弹窗样式 */
    .password-modal {
      position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999;
    }
    .password-modal-content {
      background:#fff;border-radius:16px;padding:32px 24px;width:90%;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,0.15);text-align:center;
    }
    .password-modal-title {font-size:18px;font-weight:500;color:#1d1d1f;margin-bottom:20px;}
    .password-modal-input {width:100%;padding:12px 16px;border:1px solid #e5e5e7;border-radius:8px;font-size:16px;margin-bottom:8px;box-sizing:border-box;transition:border-color 0.2s ease;}
    .password-modal-input.error {border-color:#ff4444;box-shadow:0 0 0 2px rgba(255,68,68,0.1);}
    .password-modal-input:focus {outline:none;border-color:#007aff;box-shadow:0 0 0 2px rgba(0,122,255,0.2);}
    .password-modal-error {color:#ff4444;font-size:14px;margin-bottom:20px;min-height:18px;text-align:left;padding-left:4px;line-height:1.4;}
    .password-modal-btns {display:flex;gap:12px;justify-content:center;}
    .password-modal-btn {padding:10px 24px;border-radius:8px;border:none;font-size:16px;cursor:pointer;flex:1;max-width:150px;}
    .password-modal-confirm {background:#007aff;color:#fff;}
    .password-modal-cancel {background:#f5f5f5;color:#666;}
  </style>
</head>
<body>
<!-- 密码弹窗 -->
<div class="password-modal" id="passwordModal">
  <div class="password-modal-content">
    <div class="password-modal-title">请输入页面访问密码</div>
    <input type="password" class="password-modal-input" id="passwordInput" placeholder="请输入密码">
    <div class="password-modal-error" id="passwordError"></div>
    <div class="password-modal-btns">
      <button class="password-modal-btn password-modal-cancel" id="cancelBtn">取消</button>
      <button class="password-modal-btn password-modal-confirm" id="confirmBtn">确认</button>
    </div>
  </div>
</div>

<!-- 页面主体 -->
<button class="reset-search-btn" id="resetSearchBtn" onclick="resetSearch()">重置搜索</button>
<div class="header">
  <h1>活动日程</h1>
</div>
<div class="filter-bar">
  <button class="filter-btn active" onclick="f('all')">全部</button>
  <button class="filter-btn" onclick="f('mingchao')">鸣潮</button>
  <button class="filter-btn" onclick="f('warmth')">无限暖暖</button>
  <button class="filter-btn" onclick="f('genshin')">原神</button>
  <button class="filter-btn" onclick="f('juequ')">绝区零</button>
  <button class="filter-btn" onclick="f('starrail')">星穹铁道</button>
  <button class="filter-btn" onclick="f('reverse')">重返未来</button>
  <button class="filter-btn" onclick="f('Arknigs')">明日方舟</button>
  <button class="filter-btn" onclick="f('Arknigs：Endfield')">终末地</button>
  <button class="filter-btn sort-btn" onclick="toggleSort()">按时间 ↓</button>
</div>
<div class="card-list" id="cardList"></div>
<div class="add-record-btn" onclick="openModal()">
  <span class="add-icon">+</span><span>添加活动</span>
</div>

<div class="toolbar">
  <div class="toolbar-item" onclick="toggleLayout()"><span>⬛</span><span>布局</span></div>
  <div class="toolbar-item" onclick="testRemind()"><span>⏰</span><span>提醒</span></div>
  <div class="toolbar-item" onclick="toggleSort()"><span>↓↑</span><span>排序</span></div>
  <div class="toolbar-item" onclick="search()"><span>🔍</span><span>搜索</span></div>
<!-- 新增导出/导入按钮解决同步问题 -->
<div class="toolbar-item" onclick="exportData()"><span>📤</span><span>导出</span></div>
<div class="toolbar-item" onclick="importData()"><span>📥</span><span>导入</span></div>
</div>

<!-- 编辑弹窗 -->
<div class="modal" id="md">
  <div class="modal-content">
    <div id="modalTitle" style="font-size:18px;margin-bottom:16px">添加活动</div>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label class="form-label" for="n">活动名</label>
      <input class="form-input" id="n">
    </div>
    <div class="form-group">
      <label class="form-label" for="g">游戏</label>
      <select class="form-select" id="g">
        <option value="mingchao">鸣潮</option>
        <option value="warmth">无限暖暖</option>
        <option value="genshin">原神</option>
        <option value="juequ">绝区零</option>
        <option value="starrail">星穹铁道</option>
        <option value="reverse">重返未来</option>
        <option value="Arknigs">明日方舟</option>
        <option value="Arknigs：Endfield">终末地</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="s">开始</label>
      <input type="date" class="form-input" id="s">
    </div>
    <div class="form-group">
      <label class="form-label" for="e">结束</label>
      <input type="date" class="form-input" id="e">
    </div>
    <div class="form-group">
      <label class="form-label" for="r">提前几天提醒</label>
      <select class="form-select" id="r">
        <option value="1">1天</option>
        <option value="3">3天</option>
        <option value="5">5天</option>
        <option value="7">7天</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeMd()">取消</button>
      <button class="modal-btn confirm" id="modalBtn" onclick="saveOrUpdate()">保存</button>
    </div>
  </div>
</div>

<script>
// 全局常量与变量
const STORAGE_KEY = "game_activity_list";
const VERIFY_PASSWORD = "1212"; // 可自行修改
const defaultData = [
  {id:1,name:"鸣潮3.0",game:"mingchao",start:"2026-01-15",end:"2026-02-04",remind:1},
  {id:2,name:"风物任务活动予我无冕之心",game:"warmth",start:"2026-03-03",end:"2026-03-27",remind:2},
  {id:3,name:"原神5.5",game:"genshin",start:"2026-02-25",end:"2026-03-17",remind:1},
  {id:4,name:"绝区零旧梦",game:"juequ",start:"2026-02-14",end:"2026-04-15",remind:3},
  {id:5,name:"星穹铁道4.0",game:"starrail",start:"2026-02-13",end:"2026-03-03",remind:2}
];

let list = [];
let filter = "all";
let asc = true;
let grid = false;
let isEdit = false;
let isPasswordVerified = false;
let lastSearchKeyword = "";

// ========== 密码弹窗逻辑 ==========
function showPasswordModal() {
  document.getElementById("passwordModal").style.display = "flex";
  const inputEl = document.getElementById("passwordInput");
  inputEl.focus();
  inputEl.classList.remove("error");
  document.getElementById("passwordError").textContent = "";
}

function hidePasswordModal() {
  document.getElementById("passwordModal").style.display = "none";
  document.getElementById("passwordInput").value = "";
}

function handlePasswordCancel() {
  alert("❌ 未输入密码，无法访问页面！");
  location.reload();
}

function handlePasswordConfirm() {
  const inputEl = document.getElementById("passwordInput");
  const errorEl = document.getElementById("passwordError");
  const inputPwd = inputEl.value.trim();

  if (!inputPwd) {
    errorEl.textContent = "⚠️ 请输入密码后再确认！";
    inputEl.classList.add("error");
    inputEl.focus();
    return;
  }

  if (inputPwd !== VERIFY_PASSWORD) {
    errorEl.textContent = "❌ 密码错误！正确密码：1212";
    inputEl.classList.add("error");
    inputEl.value = "";
    inputEl.focus();
    return;
  }

  // 密码验证成功：立即加载数据并渲染
  isPasswordVerified = true;
  hidePasswordModal();
  loadData(); // 核心：验证成功后立即加载
  render();   // 核心：强制立即渲染
}

// ========== 数据存储逻辑 ==========
// 读取数据
function loadData() {
  try {
    const storedData = localStorage.getItem(STORAGE_KEY);
    if (storedData) {
      list = JSON.parse(storedData);
      console.log("✅ 读取本地数据成功：", list);
    } else {
      list = [...defaultData];
      saveData();
      console.log("ℹ️ 无本地数据，使用默认数据");
    }
  } catch (e) {
    list = [...defaultData];
    saveData();
    console.error("❌ 数据读取失败，恢复默认数据：", e);
  }
}

// 保存数据
function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    console.log("✅ 数据保存成功：", list);
  } catch (e) {
    alert("❌ 数据保存失败：" + e.message);
    console.error("数据保存失败：", e);
  }
}

// ========== 工具与业务逻辑 ==========
function fmt(d) {
  const t = new Date(d);
  return `${t.getFullYear()}/${String(t.getMonth()+1).padStart(2,0)}/${String(t.getDate()).padStart(2,0)}`;
}

function left(end) {
  const now = new Date();
  now.setHours(0,0,0,0);
  const ed = new Date(end);
  ed.setHours(0,0,0,0);
  return Math.ceil((ed - now) / 86400000);
}

function del(id) {
  if (!confirm("确定删除？")) return;
  list = list.filter(item => item.id !== id);
  saveData();
  render();
}

function edit(id) {
  isEdit = true;
  const item = list.find(i => i.id === id);
  document.getElementById("editId").value = id;
  document.getElementById("n").value = item.name;
  document.getElementById("g").value = item.game;
  document.getElementById("s").value = item.start;
  document.getElementById("e").value = item.end;
  document.getElementById("r").value = item.remind || 1;
  document.getElementById("modalTitle").innerText = "修改活动";
  document.getElementById("modalBtn").innerText = "修改";
  document.getElementById("md").style.display = "flex";
}

function openModal() {
  isEdit = false;
  document.getElementById("editId").value = "";
  document.getElementById("n").value = "";
  document.getElementById("g").value = "mingchao";
  document.getElementById("s").value = "";
  document.getElementById("e").value = "";
  document.getElementById("r").value = 1;
  document.getElementById("modalTitle").innerText = "添加活动";
  document.getElementById("modalBtn").innerText = "保存";
  document.getElementById("md").style.display = "flex";
}

function saveOrUpdate() {
  const id = document.getElementById("editId").value;
  const name = document.getElementById("n").value;
  const game = document.getElementById("g").value;
  const start = document.getElementById("s").value;
  const end = document.getElementById("e").value;
  const remind = Number(document.getElementById("r").value);

  if (!name || !start || !end) return alert("请填完整信息！");

  if (isEdit) {
    const idx = list.findIndex(i => i.id == id);
    list[idx] = {...list[idx], name, game, start, end, remind};
  } else {
    list.push({id: Date.now(), name, game, start, end, remind});
  }

  saveData();
  closeMd();
  render();
}

function render() {
  const el = document.getElementById("cardList");
  el.innerHTML = "";
  let arr = [...list];

  // 筛选
  if (filter !== "all") arr = arr.filter(i => i.game === filter);
  // 排序
  arr.sort((a, b) => asc ? new Date(a.end) - new Date(b.end) : new Date(b.end) - new Date(a.end));

  // 渲染卡片
  arr.forEach(item => {
    const l = left(item.end);
    const ex = l < 0;
    const cn = ex ? "card expired" : "card";
    
    const actionHtml = ex ? `
      <div class="card-actions-wrap">
        <span style="color:#86868b;">已过期无提醒</span>
        <div class="card-opt-group">
          <span class="card-edit" onclick="edit(${item.id})">修改</span>
          <span class="card-del" onclick="del(${item.id})">删除</span>
        </div>
      </div>
    ` : `
      <div class="card-actions-wrap">
        <div class="card-remind" onclick="setRemind(${item.id})">⏰ 提前${item.remind||1}天提醒</div>
        <div class="card-opt-group">
          <span class="card-edit" onclick="edit(${item.id})">修改</span>
          <span class="card-del" onclick="del(${item.id})">删除</span>
        </div>
      </div>
    `;

    const html = `
      <span class="card-game-tag ${item.game}">${gn(item.game)}</span>
      ${ex ? '<span class="card-expire">已过期</span>' : (l <=7 ? `<span class="card-expire">剩${l}天</span>` : '')}
      <div class="card-title">${item.name}</div>
      <div class="card-row"><span class="calendar-icon">📅</span><span class="card-label">开始</span><span class="date-value">${fmt(item.start)}</span></div>
      <div class="card-row"><span class="calendar-icon">📅</span><span class="card-label">结束</span><span class="date-value">${fmt(item.end)}</span></div>
      ${actionHtml}
    `;

    const div = document.createElement("div");
    div.className = cn;
    div.dataset.id = item.id;
    div.innerHTML = html;
    el.appendChild(div);
  });

  // 布局适配
  el.style.gridTemplateColumns = grid ? "repeat(auto-fill,minmax(280px,1fr))" : "1fr";

  // 搜索高亮
  if (lastSearchKeyword) highlightSearchResults(lastSearchKeyword);
}

function gn(g) {
  const m = {
    mingchao:"鸣潮",warmth:"无限暖暖",genshin:"原神",juequ:"绝区零",
    starrail:"星穹铁道",reverse:"重返未来",Arknigs:"明日方舟",
    "Arknigs：Endfield":"终末地"
  };
  return m[g] || g;
}

function f(g) {
  filter = g;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

function toggleSort() {
  asc = !asc;
  document.querySelector(".sort-btn").innerText = "按时间 " + (asc ? "↓" : "↑");
  render();
}

function toggleLayout() {
  grid = !grid;
  render();
}

function closeMd() {
  document.getElementById("md").style.display = "none";
}

function setRemind(id) {
  const item = list.find(i => i.id === id);
  const d = prompt("提前几天提醒？", item.remind || 1);
  if (!d) return;
  item.remind = Number(d);
  saveData();
  render();
  alert("提醒设置成功！");
}

function highlightSearchResults(keyword) {
  const allCards = document.querySelectorAll('.card');
  let hasMatch = false;

  allCards.forEach(card => {
    const item = list.find(i => i.id == card.dataset.id);
    const isMatch = item.name.includes(keyword) || gn(item.game).includes(keyword);
    
    if (isMatch) {
      card.classList.add('highlight');
      card.classList.remove('faded');
      hasMatch = true;
    } else {
      card.classList.remove('highlight');
      card.classList.add('faded');
    }
  });

  document.getElementById('resetSearchBtn').style.display = hasMatch ? 'block' : 'none';
  if (!hasMatch) alert("❌ 搜索失败：无匹配内容");
}

function resetSearch() {
  document.querySelectorAll('.card').forEach(card => card.classList.remove('highlight', 'faded'));
  lastSearchKeyword = "";
  document.getElementById('resetSearchBtn').style.display = 'none';
}

function search() {
  const keyword = prompt("请输入活动名/游戏名搜索：");
  if (!keyword) return;
  lastSearchKeyword = keyword;
  highlightSearchResults(keyword);
}

function testRemind() {
  alert("本地提醒功能已启用，活动到期前会提醒！");
}
// 导出数据（解决跨设备同步）
function exportData() {
  try {
    const dataStr = JSON.stringify(list, null, 2);
    const dataBlob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(dataBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `游戏活动数据_${new Date().toLocaleDateString().replace(/\//g, '-')}.json`;
    a.click();
    URL.revokeObjectURL(url);
    alert("✅ 数据导出成功！文件已下载");
  } catch (e) {
    alert("❌ 数据导出失败：" + e.message);
    console.error("导出失败：", e);
  }
}

// 导入数据（解决跨设备同步）
function importData() {
  // 创建隐藏的文件选择器
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(event) {
      try {
        const importedData = JSON.parse(event.target.result);
        // 验证数据格式
        if (Array.isArray(importedData) && importedData.every(item => item.id && item.name && item.game)) {
          list = importedData;
          saveData();
          render();
          alert("✅ 数据导入成功！");
        } else {
          alert("❌ 导入失败：文件格式不正确，不是有效的活动数据");
        }
      } catch (e) {
        alert("❌ 导入失败：文件解析错误 - " + e.message);
        console.error("导入解析失败：", e);
      }
    };
    reader.readAsText(file);
  };
  
  input.click(); // 触发文件选择
}

// ========== 页面初始化 ==========
window.onload = () => {
  // 绑定按钮事件
  document.getElementById("confirmBtn").addEventListener("click", handlePasswordConfirm);
  document.getElementById("cancelBtn").addEventListener("click", handlePasswordCancel);
  // 显示密码弹窗
  showPasswordModal();
};
</script>
