<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>私人活动日程（最终版）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{background:#f7f8fa;padding:16px 16px 80px}
.header{display:flex;align-items:center;gap:12px;padding:10px 0}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
.filter-btn{padding:6px 12px;border-radius:8px;background:#fff;border:1px solid #e5e5e7;font-size:14px;cursor:pointer}
.filter-btn.active{background:#007aff;color:#fff}
.sort-btn{margin-left:auto}
.card-list{display:grid;grid-template-columns:1fr;gap:16px}
.card{background:#fff;border-radius:12px;padding:20px;position:relative;box-shadow:0 1px 3px #0001}
.card.expired{opacity:0.45;filter:grayscale(80%)}
.card-expire{position:absolute;right:16px;top:16px;font-size:12px;padding:3px 6px;border-radius:4px;background:#ffebee;color:#d32f2f}

/* 操作区总容器：提醒+修改+删除 统一对齐 */
.card-actions-wrap {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-top: 16px;
  width: 100%;
}
.card-remind {
  font-size: 13px;
  color: #007aff;
  cursor: pointer;
  margin: 0;
  flex-shrink: 0;
}
.card-opt-group {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.card-edit {
  font-size: 14px;
  padding: 3px 6px;
  cursor: pointer;
  color: #1890ff;
  background: transparent;
  border: none;
}
.card-del {
  font-size: 14px;
  padding: 3px 6px;
  cursor: pointer;
  color: #666;
  background: transparent;
  border: none;
}
.card-del:hover {color: #ff4444;}

.card-opt{display: none;}
.card-game-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;margin-bottom:8px}
.card-game-tag.mingchao{background:#e6f7ff;color:#1890ff}
.card-game-tag.warmth{background:#fff0f6;color:#eb2f96}
.card-game-tag.genshin{background:#f6ffed;color:#52c41a}
.card-game-tag.juequ{background:#f9f0ff;color:#722ed1}
.card-game-tag.starrail{background:#fff7e6;color:#fa8c16}
.card-game-tag.reverse{background:#e5e6eb;color:#333}
.card-game-tag.Arknigs{background:#ffecec;color:#e64343}
.card-game-tag.Arknigs\:Endfield{background:#f0f9ff;color:#2b8ce5}
.card-title{font-size:18px;font-weight:500;margin-bottom:16px}
/* 开始/结束行 跨端统一样式 */
.card-row{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:15px;line-height:1.2;
}
/* 日历图标 跨端统一 */
.calendar-icon {
  display: inline-block;width:20px;height:20px;font-size:16px;color:#007aff;text-align:center;line-height:20px;flex-shrink:0;
}
.card-label{color:#86868b;min-width:50px;flex-shrink:0;}
/* 日期数值 跨端统一 */
.date-value{font-size:15px;color:#1d1d1f;flex:1;}
.add-record-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;border-radius:12px;padding:16px;margin-top:24px}
.add-icon{width:24px;height:24px;border:1px solid #999;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#999}
.toolbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e5e7;display:flex;justify-content:space-around;padding:12px 0}
.toolbar-item{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:12px;color:#666;cursor:pointer}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:#0008;display:none;align-items:center;justify-content:center}
.modal-content{background:#fff;border-radius:12px;padding:24px;width:90%;max-width:400px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:14px;color:#666;margin-bottom:4px}
.form-input,.form-select{
  width:100%;padding:10px 12px;border:1px solid #e5e5e5;border-radius:8px;font-size:15px;line-height:1.4;
  appearance: none;-webkit-appearance: none;background-color: #fff;box-sizing: border-box;
}
/* 日期输入框 跨端统一核心样式 */
input[type="date"]{
  font-family: inherit;color: #333;height: 42px;box-sizing: border-box;
}
input[type="date"]::-webkit-calendar-picker-indicator {
  width:20px;height:20px;margin-right:8px;cursor:pointer;filter: invert(0.5);
}
/* Edge专属：修复日期输入框样式 */
input[type="date"]::-ms-clear {display: none;}
/* 统一焦点样式 */
.form-input:focus,.form-select:focus{
  outline: none;border-color: #007aff;box-shadow: 0 0 0 2px rgba(0, 122, 255, 0.2);
}
.modal-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:20px}
.modal-btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer}
.cancel{background:#f5f5f5;color:#666}
.confirm{background:#007aff;color:#fff}
/* 适配电脑端大屏布局 */
@media screen and (min-width: 768px) {
  .card-list{grid-template-columns: repeat(auto-fill,minmax(350px,1fr));gap:20px}
  body{padding:24px 24px 80px}
  .card{padding:24px}
}
/* 密码弹窗样式 */
.password-modal {
  z-index: 9999;
}
.password-modal .modal-content {
  max-width: 350px;
}
</style>
</head>
<body>

<!-- 密码验证弹窗 -->
<div class="modal password-modal" id="passwordModal">
  <div class="modal-content">
    <div id="passwordTitle" style="font-size:18px;margin-bottom:16px">验证密码</div>
    <div class="form-group">
      <label class="form-label" for="passwordInput">请输入密码</label>
      <input type="password" class="form-input" id="passwordInput" placeholder="请输入密码">
    </div>
    <div class="modal-actions">
      <button class="modal-btn confirm" id="passwordBtn" onclick="verifyPassword()">确认</button>
    </div>
  </div>
</div>

<!-- 修改密码弹窗 -->
<div class="modal" id="changePwdModal">
  <div class="modal-content">
    <div style="font-size:18px;margin-bottom:16px">修改密码</div>
    <div class="form-group">
      <label class="form-label" for="oldPwd">原密码</label>
      <input type="password" class="form-input" id="oldPwd" placeholder="请输入原密码">
    </div>
    <div class="form-group">
      <label class="form-label" for="newPwd">新密码</label>
      <input type="password" class="form-input" id="newPwd" placeholder="请输入新密码">
    </div>
    <div class="form-group">
      <label class="form-label" for="confirmPwd">确认新密码</label>
      <input type="password" class="form-input" id="confirmPwd" placeholder="请再次输入新密码">
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeChangePwdModal()">取消</button>
      <button class="modal-btn confirm" onclick="changePassword()">确认修改</button>
    </div>
  </div>
</div>

<div class="header">
  <h1>活动日程</h1>
  <button class="filter-btn" style="margin-left:auto" onclick="openChangePwdModal()">修改密码</button>
</div>

<div class="filter-bar">
<button class="filter-btn active" onclick="f('all')">全部</button>
<button class="filter-btn" onclick="f('mingchao')">鸣潮</button>
<button class="filter-btn" onclick="f('warmth')">无限暖暖</button>
<button class="filter-btn" onclick="f('genshin')">原神</button>
<button class="filter-btn" onclick="f('juequ')">绝区零</button>
<button class="filter-btn" onclick="f('starrail')">星穹铁道</button>
<button class="filter-btn" onclick="f('reverse')">重返未来</button>
<button class="filter-btn" onclick="f('Arknigs')">明日方舟</button>
<button class="filter-btn" onclick="f('Arknigs：Endfield')">终末地</button>
<button class="filter-btn sort-btn" onclick="toggleSort()">按时间 ↓</button>
</div>

<div class="card-list" id="cardList"></div>

<div class="add-record-btn" onclick="openModal()">
<span class="add-icon">+</span><span>添加活动</span>
</div>

<div class="toolbar">
<div class="toolbar-item" onclick="toggleLayout()"><span>⬛</span><span>布局</span></div>
<div class="toolbar-item" onclick="testRemind()"><span>⏰</span><span>提醒</span></div>
<div class="toolbar-item" onclick="toggleSort()"><span>↓↑</span><span>排序</span></div>
<div class="toolbar-item" onclick="search()"><span>🔍</span><span>搜索</span></div>
</div>

<!-- 修复label关联后的弹窗 -->
<div class="modal" id="md">
<div class="modal-content">
<div id="modalTitle" style="font-size:18px;margin-bottom:16px">添加活动</div>
<input type="hidden" id="editId">
<div class="form-group">
  <label class="form-label" for="n">活动名</label>
  <input class="form-input" id="n">
</div>
<div class="form-group">
  <label class="form-label" for="g">游戏</label>
  <select class="form-select" id="g">
    <option value="mingchao">鸣潮</option>
    <option value="warmth">无限暖暖</option>
    <option value="genshin">原神</option>
    <option value="juequ">绝区零</option>
    <option value="starrail">星穹铁道</option>
    <option value="reverse">重返未来</option>
    <option value="Arknigs">明日方舟</option>
    <option value="Arknigs：Endfield">终末地</option>
  </select>
</div>
<div class="form-group">
  <label class="form-label" for="s">开始</label>
  <input type="date" class="form-input" id="s">
</div>
<div class="form-group">
  <label class="form-label" for="e">结束</label>
  <input type="date" class="form-input" id="e">
</div>
<div class="form-group">
  <label class="form-label" for="r">提前几天提醒</label>
  <select class="form-select" id="r">
    <option value="1">1天</option>
    <option value="3">3天</option>
    <option value="5">5天</option>
    <option value="7">7天</option>
  </select>
</div>
<div class="modal-actions">
  <button class="modal-btn cancel" onclick="closeMd()">取消</button>
  <button class="modal-btn confirm" id="modalBtn" onclick="saveOrUpdate()">保存</button>
</div>
</div>
</div>

<script>
// 全局常量&变量
const STORAGE_KEY = "game_activity_list_edge"; // Edge专属键名，避免冲突
const PWD_STORAGE_KEY = "game_activity_pwd_edge"; // 密码存储键名
const defaultData = [
{id:1,name:"鸣潮3.0",game:"mingchao",start:"2026-01-15",end:"2026-02-04",remind:1},
{id:2,name:"风物任务活动予我无冕之心",game:"warmth",start:"2026-03-03",end:"2026-03-27",remind:2},
{id:3,name:"原神5.5",game:"genshin",start:"2026-02-25",end:"2026-03-17",remind:1},
{id:4,name:"绝区零旧梦",game:"juequ",start:"2026-02-14",end:"2026-04-15",remind:3},
{id:5,name:"星穹铁道4.0",game:"starrail",start:"2026-02-13",end:"2026-03-03",remind:2}
];
let list = [];
let filter = "all";
let asc = true;
let grid = false;
let isEdit = false;
let isAuthenticated = false; // 是否通过密码验证

// 密码加密（简单哈希，增强安全性）
function encryptPwd(pwd) {
  // 使用简单的哈希算法 + 盐值，避免明文存储
  const salt = "game_activity_2026";
  return btoa(unescape(encodeURIComponent(pwd + salt))); // Base64编码
}

// 验证密码
function verifyPassword() {
  const inputPwd = document.getElementById("passwordInput").value.trim();
  if (!inputPwd) {
    alert("请输入密码！");
    return;
  }
  
  const storedPwd = localStorage.getItem(PWD_STORAGE_KEY);
  // 首次设置密码
  if (!storedPwd) {
    if (confirm("首次使用，是否将当前输入的密码设为默认密码？")) {
      localStorage.setItem(PWD_STORAGE_KEY, encryptPwd(inputPwd));
      isAuthenticated = true;
      document.getElementById("passwordModal").style.display = "none";
      initApp(); // 初始化应用
      alert("密码设置成功！");
    }
    return;
  }
  
  // 验证已有密码
  if (encryptPwd(inputPwd) === storedPwd) {
    isAuthenticated = true;
    document.getElementById("passwordModal").style.display = "none";
    initApp(); // 初始化应用
  } else {
    alert("密码错误，请重新输入！");
    document.getElementById("passwordInput").value = "";
  }
}

// 修改密码
function changePassword() {
  const oldPwd = document.getElementById("oldPwd").value.trim();
  const newPwd = document.getElementById("newPwd").value.trim();
  const confirmPwd = document.getElementById("confirmPwd").value.trim();
  
  if (!oldPwd || !newPwd || !confirmPwd) {
    alert("请填写完整密码信息！");
    return;
  }
  
  if (newPwd !== confirmPwd) {
    alert("两次输入的新密码不一致！");
    return;
  }
  
  const storedPwd = localStorage.getItem(PWD_STORAGE_KEY);
  if (encryptPwd(oldPwd) !== storedPwd) {
    alert("原密码错误！");
    return;
  }
  
  localStorage.setItem(PWD_STORAGE_KEY, encryptPwd(newPwd));
  closeChangePwdModal();
  alert("密码修改成功！下次登录请使用新密码。");
}

// 打开修改密码弹窗
function openChangePwdModal() {
  if (!isAuthenticated) {
    alert("请先完成密码验证！");
    showPasswordModal();
    return;
  }
  document.getElementById("oldPwd").value = "";
  document.getElementById("newPwd").value = "";
  document.getElementById("confirmPwd").value = "";
  document.getElementById("changePwdModal").style.display = "flex";
}

// 关闭修改密码弹窗
function closeChangePwdModal() {
  document.getElementById("changePwdModal").style.display = "none";
}

// 显示密码弹窗
function showPasswordModal() {
  document.getElementById("passwordInput").value = "";
  document.getElementById("passwordModal").style.display = "flex";
  document.getElementById("passwordInput").focus();
}

// 【Edge适配】读取数据（增加Edge兼容性）
function loadData() {
  try {
    // Edge的localStorage在隐私模式下不可用，增加兜底
    if (!window.localStorage) {
      alert("Edge浏览器已禁用本地存储，无法同步数据！请关闭隐私模式");
      list = [...defaultData];
      return;
    }
    const storedData = localStorage.getItem(STORAGE_KEY);
    if (storedData) {
      list = JSON.parse(storedData);
      console.log("✅ Edge读取本地数据成功：", list);
    } else {
      list = [...defaultData];
      saveData();
      console.log("ℹ️ Edge无本地数据，使用默认数据");
    }
  } catch (e) {
    list = [...defaultData];
    saveData();
    console.error("❌ Edge数据读取失败，恢复默认数据：", e);
  }
}

// 【Edge适配】保存数据（强制触发同步）
function saveData() {
  try {
    if (!window.localStorage) return;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    console.log("✅ Edge数据保存成功：", list);
    
    // Edge专属：手动触发同步（解决Edge不触发storage事件的问题）
    setTimeout(() => {
      window.dispatchEvent(new Event('storage'));
    }, 500);
  } catch (e) {
    alert("❌ Edge数据保存失败：" + e.message);
    console.error("Edge数据保存失败：", e);
  }
}

// 格式化日期
function fmt(d){const t=new Date(d);return t.getFullYear()+"/"+String(t.getMonth()+1).padStart(2,0)+"/"+String(t.getDate()).padStart(2,0)}
// 计算剩余天数
function left(end){const now=new Date();now.setHours(0,0,0,0);const ed=new Date(end);ed.setHours(0,0,0,0);return Math.ceil((ed-now)/86400000)}

// 删除活动
function del(id){
  if(!confirm("确定要删除这条活动吗？")) return;
  list = list.filter(item => item.id !== id);
  saveData();
  render();
}

// 打开修改弹窗
function edit(id){
  isEdit = true;
  const item = list.find(i => i.id === id);
  if(!item) return;
  document.getElementById("editId").value = id;
  document.getElementById("n").value = item.name;
  document.getElementById("g").value = item.game;
  document.getElementById("s").value = item.start;
  document.getElementById("e").value = item.end;
  document.getElementById("r").value = item.remind || 1;
  document.getElementById("modalTitle").innerText = "修改活动";
  document.getElementById("modalBtn").innerText = "修改";
  document.getElementById("md").style.display = "flex";
}

// 打开添加弹窗
function openModal(){
  isEdit = false;
  document.getElementById("editId").value = "";
  document.getElementById("n").value = "";
  document.getElementById("g").value = "mingchao";
  document.getElementById("s").value = "";
  document.getElementById("e").value = "";
  document.getElementById("r").value = 1;
  document.getElementById("modalTitle").innerText = "添加活动";
  document.getElementById("modalBtn").innerText = "保存";
  document.getElementById("md").style.display = "flex";
}

// 保存/修改活动
function saveOrUpdate(){
  const id = document.getElementById("editId").value;
  const name = document.getElementById("n").value;
  const game = document.getElementById("g").value;
  const start = document.getElementById("s").value;
  const end = document.getElementById("e").value;
  const remind = Number(document.getElementById("r").value);
  
  if(!name||!start||!end) return alert("请填完整信息！");
  
  if(isEdit){
    const index = list.findIndex(i => i.id == id);
    if(index > -1){
      list[index] = {...list[index], name, game, start, end, remind};
      alert("修改成功！");
    }
  }else{
    list.push({id: Date.now(), name, game, start, end, remind});
    alert("添加成功！");
  }
  saveData();
  closeMd();
  render();
}

// 渲染页面
function render(){
  if (!isAuthenticated) return; // 未验证密码不渲染
  const el=document.getElementById("cardList");el.innerHTML="";
  let arr=[...list];
  if(filter!=="all")arr=arr.filter(i=>i.game===filter);
  arr.sort((a,b)=>{const aa=new Date(a.end),bb=new Date(b.end);return asc?aa-bb:bb-aa});
  arr.forEach(item=>{
    const l=left(item.end);
    const ex=l<0;
    const cn=ex?"card expired":"card";
    const actionHtml = ex 
      ? `
        <div class="card-actions-wrap">
          <span style="color:#86868b;">已过期无提醒</span>
          <div class="card-opt-group">
            <span class="card-edit" onclick="edit(${item.id})">修改</span>
            <span class="card-del" onclick="del(${item.id})">删除</span>
          </div>
        </div>
      `
      : `
        <div class="card-actions-wrap">
          <div class="card-remind" onclick="setRemind(${item.id})">⏰ 提前${item.remind||1}天提醒</div>
          <div class="card-opt-group">
            <span class="card-edit" onclick="edit(${item.id})">修改</span>
            <span class="card-del" onclick="del(${item.id})">删除</span>
          </div>
        </div>
      `;
    const html=`
    <span class="card-game-tag ${item.game}">${gn(item.game)}</span>
    ${ex?'<span class="card-expire">已过期</span>':(l<=7?`<span class="card-expire">剩${l}天</span>`:'')}
    <div class="card-title">${item.name}</div>
    <div class="card-row"><span class="calendar-icon">📅</span><span class="card-label">开始</span><span class="date-value">${fmt(item.start)}</span></div>
    <div class="card-row"><span class="calendar-icon">📅</span><span class="card-label">结束</span><span class="date-value">${fmt(item.end)}</span></div>
    ${actionHtml}
    `;
    const div=document.createElement("div");div.className=cn;div.innerHTML=html;el.appendChild(div);
  });
  el.style.gridTemplateColumns=grid?"repeat(auto-fill,minmax(280px,1fr))":"1fr";
}

// 游戏名映射
function gn(g){
  const m={
    mingchao:"鸣潮",warmth:"无限暖暖",genshin:"原神",juequ:"绝区零",
    starrail:"星穹铁道",reverse:"重返未来",Arknigs:"明日方舟",
    "Arknigs：Endfield":"终末地"
  };
  return m[g]||g;
}
// 筛选
function f(g){filter=g;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));event.target.classList.add("active");render()}
// 切换排序
function toggleSort(){asc=!asc;document.querySelector(".sort-btn").innerText="按时间 "+(asc?"↓":"↑");render()}
// 切换布局
function toggleLayout(){grid=!grid;render()}
// 关闭弹窗
function closeMd(){document.getElementById("md").style.display="none"}
// 设置提醒
function setRemind(id){const item=list.find(i=>i.id===id);if(!item)return;const d=prompt("提前几天？",item.remind||1);if(!d)return;item.remind=Number(d);saveData();render();alert("提醒设置成功")}
// 搜索
function search(){const k=prompt("请输入活动名搜索");if(!k)return;const res=list.filter(i=>i.name.includes(k));alert(res.length?res.map(i=>i.name).join("\n"):"无匹配结果")}
// 测试提醒
function testRemind(){alert("本地提醒功能已开启，活动到期前会提醒哦～")}

// 【Edge适配】强化同步监听（解决Edge不触发storage事件的问题）
function syncEdgeData() {
  if (!isAuthenticated) return;
  loadData();
  render();
  console.log("🔄 Edge数据同步检查");
}

// 初始化应用
function initApp() {
  loadData();
  render();
  // 1. 监听storage事件（兼容标准）
  window.addEventListener("storage", syncEdgeData);
  // 2. 每3秒主动同步（Edge专属，解决事件不触发）
  setInterval(syncEdgeData, 3000);
  // 3. 页面聚焦时同步（切换标签页/设备后刷新）
  window.addEventListener("visibilitychange", () => {
    if (!document.hidden) syncEdgeData();
  });
  // 强制触发一次Edge同步
  setTimeout(syncEdgeData, 1000);
}

// 页面加载时初始化
window.onload=()=>{
  // 优先验证密码
  showPasswordModal();
};
</script>
