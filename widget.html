<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏活动倒计时</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      background: #f7f8fa;
      padding: 8px;
      border-radius: 16px;
      height: 100vh;
      overflow: hidden;
    }
    .widget-card {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      height: 100%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
    }
    .widget-title {
      font-size: 14px;
      font-weight: 600;
      color: #1d1d1f;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .event-list {
      flex: 1;
      overflow-y: auto;
    }
    .event-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f2;
    }
    .event-item:last-child {
      border-bottom: none;
    }
    .event-info {
      flex: 1;
    }
    .event-name {
      font-size: 12px;
      color: #1d1d1f;
      font-weight: 500;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .event-game {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 8px;
      font-size: 10px;
      color: #fff;
      margin-right: 4px;
    }
    .event-countdown {
      font-size: 11px;
      color: #007aff;
      font-weight: 500;
    }
    .event-expired {
      color: #86868b;
    }
    .game-genshin { background: #52c41a; }
    .game-starrail { background: #fa8c16; }
    .game-Arknigs { background: #9e2120; }
    .game-mingchao { background: #1890ff; }
    .game-juequ { background: #722ed1; }
  </style>
</head>
<body>
  <div class="widget-card">
    <div class="widget-title">📅 关键活动倒计时</div>
    <div class="event-list" id="event-list">加载中...</div>
  </div>
  <script>
    function leftDays(end) {
      const now = new Date();
      now.setHours(0,0,0,0);
      const ed = new Date(end);
      ed.setHours(0,0,0,0);
      return Math.ceil((ed - now) / 86400000);
    }

    function getGameClass(game) {
      const map = {
        "原神": "game-genshin",
        "星穹铁道": "game-starrail",
        "明日方舟": "game-Arknigs",
        "鸣潮": "game-mingchao",
        "绝区零": "game-juequ"
      };
      return map[game] || "";
    }

    fetch('/data/events.json')
      .then(res => res.json())
      .then(events => {
        const listEl = document.getElementById('event-list');
        // 过滤并排序：先显示未过期，按剩余时间升序
        const sortedEvents = events
          .map(e => ({...e, left: leftDays(e.end)}))
          .sort((a, b) => a.left - b.left);

        if (sortedEvents.length === 0) {
          listEl.innerHTML = '<div style="text-align:center;color:#86868b;font-size:12px;padding:20px 0">暂无活动</div>';
          return;
        }

        listEl.innerHTML = sortedEvents.slice(0, 4).map(e => {
          const isExpired = e.left < 0;
          const countdownText = isExpired 
            ? '<span class="event-expired">已过期</span>'
            : e.left === 0 ? '今天结束' : `剩 ${e.left} 天`;

          return `
            <div class="event-item">
              <div class="event-info">
                <div class="event-name">
                  <span class="event-game ${getGameClass(e.game)}">${e.game}</span>
                  ${e.name}
                </div>
                <div class="event-countdown">${countdownText}</div>
              </div>
            </div>
          `;
        }).join('');
      })
      .catch(err => {
        document.getElementById('event-list').innerHTML = 
          '<div style="text-align:center;color:#ff4444;font-size:12px;padding:20px 0">加载失败</div>';
      });
  </script>
</body>
</html>
